name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node + workspace tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Verify codegen output is in sync with schemas
        run: |
          pnpm --filter @repogotchi/contract codegen
          if ! git diff --quiet packages/contract/generated packages/contract/swift/Sources; then
            echo "::error::Generated files are out of sync with schemas. Run: pnpm --filter @repogotchi/contract codegen"
            git --no-pager diff packages/contract/generated packages/contract/swift/Sources
            exit 1
          fi

      - name: Verify actions/repogotchi/dist/ is in sync with source
        run: |
          pnpm --filter @repogotchi/action build
          if ! git diff --quiet actions/repogotchi/dist; then
            echo "::error::Action bundle is out of sync with source. Run: pnpm --filter @repogotchi/action build"
            git --no-pager diff --stat actions/repogotchi/dist
            exit 1
          fi

  swift:
    name: Swift macOS build + test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build RepoGotchiContract package
        run: swift build --package-path packages/contract/swift

      - name: Build companion app
        run: swift build --package-path apps/macos-companion

      - name: Test companion core
        run: swift test --package-path apps/macos-companion
